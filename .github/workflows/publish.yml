# Publish the packaged chassis (spec 018): builds the per-platform native
# binaries and publishes the @enrahitu/* packages on a version tag.
#
#   @enrahitu/toolchain               (drivers; meta package, no binary)
#   @enrahitu/toolchain-<platform>    (encore-runtime.node + tsparser-encore)
#   @enrahitu/hiqlite-native          (napi loader; meta package, no binary)
#   @enrahitu/hiqlite-native-<triple> (the addon .node)
#
# The matrix is the spec 018 platform set (darwin-arm64, linux-x64,
# linux-arm64) and is the SAME cross-build spec 016's amd64 image consumes.
# Each leg builds and publishes its own platform packages natively (no
# cross-compilation); one designated leg additionally publishes the two meta
# packages. Requires the NPM_TOKEN secret and a claimed @enrahitu npm scope;
# leave disabled until both exist (see spec 018 Status).
name: publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # npm provenance
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            triple: darwin-arm64
            napi_triple: darwin-arm64
            publish_meta: true
          - platform: linux-x64
            runner: ubuntu-24.04
            triple: linux-x64
            napi_triple: linux-x64-gnu
            publish_meta: false
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            triple: linux-arm64
            napi_triple: linux-arm64-gnu
            publish_meta: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install protoc + cmake (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler cmake
      - name: Install protoc + cmake (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake
      - run: npm ci
      - run: npm --prefix addon ci

      # --- toolchain native binaries -> @enrahitu/toolchain-<platform> ------
      - name: Build vendored Encore runtime + tsparser
        run: npm run build:runtime
      - name: Assemble the toolchain platform package
        run: |
          dst="packages/toolchain-${{ matrix.triple }}"
          cp vendor/encore/target/release/encore-runtime.node "$dst/"
          cp vendor/encore/target/release/tsparser-encore "$dst/"
      - name: Publish @enrahitu/toolchain-${{ matrix.triple }}
        working-directory: packages/toolchain-${{ matrix.triple }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- hiqlite addon -> @enrahitu/hiqlite-native-<triple> ---------------
      - name: Build hiqlite-native addon
        run: npm run build:addon
      - name: Assemble the addon platform package
        run: |
          npm --prefix addon run create-npm-dirs
          cp addon/hiqlite-native.${{ matrix.napi_triple }}.node \
             addon/npm/${{ matrix.napi_triple }}/
      - name: Publish @enrahitu/hiqlite-native-${{ matrix.napi_triple }}
        working-directory: addon/npm/${{ matrix.napi_triple }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- meta packages (one leg only) -------------------------------------
      - name: Publish @enrahitu/toolchain (meta)
        if: matrix.publish_meta
        working-directory: packages/toolchain
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @enrahitu/hiqlite-native (meta)
        if: matrix.publish_meta
        working-directory: addon
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
