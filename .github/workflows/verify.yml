# Verify (spec 010 LI-1): run the template contract's verify verb
# (spec 009 §3.2, template.toml [verbs].verify) in CI, after the same
# builds a stamped app's toolchain performs. CI and factory verification
# exercise one gate, not two.
#
# A Postgres service backs the CoreLedger Postgres-driver arm (spec 011):
# the parameterized ledger suite runs against both drivers on every CI run
# via TEST_POSTGRES_URL, so "scaling is a driver swap" stays continuously
# proven, not proven once. The image is digest-pinned (cross-arch index).
name: verify
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        # postgres:17-alpine, pinned to the multi-arch index digest.
        image: postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enrahitu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            addon/package-lock.json
            frontend/package-lock.json
      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler
      - name: Cache cargo (vendored runtime + addon)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/encore/target
            addon/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/encore/Cargo.lock', 'addon/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - run: npm ci
      - run: npm --prefix addon ci
      - run: npm --prefix frontend ci
      - name: Build hiqlite-native addon
        run: npm run build:addon
      - name: Build vendored Encore runtime
        run: npm run build:runtime
      - name: Build app (generates encore.gen)
        run: npm run build:app
      - name: Verify (contract verb)
        env:
          TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/enrahitu_test
        run: npm run typecheck && npm test
