# Browser-real rauthy login e2e (spec 017). Deliberately NOT part of verify.yml:
# it boots dev rauthy (docker compose) plus the app and drives a real browser,
# so it runs on its own cadence, not on every push.
#
# workflow_dispatch (on demand) + a nightly schedule so the whole auth topology
# (proxy path rewriting, rauthy redirects, single-origin cookie scoping) cannot
# silently rot between releases. Flakes fail loudly: retries: 0 lives in
# e2e/playwright.config.ts.
name: e2e

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC nightly.
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  login-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            frontend-react/package-lock.json
            frontend-admin/package-lock.json
      - run: npm ci
      # Both flavors: the Encore parse walk (build:app) resolves every flavor's
      # vite.config imports (same reason as verify.yml).
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend-react ci
      - run: npm --prefix frontend-admin ci
      - name: Build app (generates encore.gen)
        run: npm run build:app
      - name: Build the SPA (-> backend/web/dist)
        run: npm run build:web
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run the login e2e
        run: npm run test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: e2e/artifacts
          retention-days: 7
